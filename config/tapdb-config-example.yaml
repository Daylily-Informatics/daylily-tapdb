# Example TAPDB CLI config
#
# Save as:
#   ~/.config/tapdb/<client-id>/<database-name>/tapdb-config.yaml
#
# The CLI resolves config in this order:
# 1) TAPDB_CONFIG_PATH
# 2) ~/.config/tapdb/<client-id>/<database-name>/tapdb-config.yaml

meta:
  config_version: 2
  client_id: local
  database_name: tapdb

environments:
  dev:
    host: localhost
    port: 5533
    user: daylily
    password: ""
    database: tapdb_dev
    audit_log_euid_prefix: AD
    support_email: support@example.com
    cognito_user_pool_id: us-east-1_xxxxxxxxx
    cognito_app_client_id: client123
    cognito_app_client_secret: ""
    cognito_client_name: tapdb
    cognito_region: us-east-1
    cognito_domain: tapdb-dev-users.auth.us-east-1.amazoncognito.com
    cognito_callback_url: https://localhost:8911/auth/callback
    cognito_logout_url: https://localhost:8911/login
    aws_profile: lsmc

  test:
    host: localhost
    port: 5534
    user: daylily
    password: ""
    database: tapdb_test
    audit_log_euid_prefix: AD
    support_email: support@example.com

  prod:
    host: example-prod-host
    port: 5533
    user: tapdb_admin
    password: CHANGEME
    database: tapdb_prod
    audit_log_euid_prefix: AD
    support_email: support@example.com

  aurora_dev:
    engine_type: aurora
    host: tapdb-dev-cluster.cluster-xxxxxxxxxxxx.us-west-2.rds.amazonaws.com
    port: 5432
    user: tapdb_admin
    password: ""
    database: tapdb_dev
    audit_log_euid_prefix: AD
    support_email: support@example.com
    region: us-west-2
    cluster_identifier: tapdb-dev-cluster
    iam_auth: true
    ssl: true
