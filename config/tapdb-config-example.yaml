# Example TAPDB CLI config
#
# Save as:
#   ~/.config/tapdb/<client-id>/<database-name>/tapdb-config.yaml
#
# Runtime commands require:
#   tapdb --config ~/.config/tapdb/<client-id>/<database-name>/tapdb-config.yaml --env <name> ...

meta:
  config_version: 3
  client_id: local
  database_name: tapdb
  euid_client_code: C

admin:
  footer:
    repo_url: https://github.com/Daylily-Informatics/daylily-tapdb
  session:
    secret: replace-me
  auth:
    mode: tapdb
    disabled_user:
      email: tapdb-admin@localhost
      role: admin
    shared_host:
      session_secret: ""
      session_cookie: session
      session_max_age_seconds: 1209600
  cors:
    allowed_origins: []
  ui:
    tls:
      cert_path: ""
      key_path: ""
  metrics:
    enabled: true
    queue_max: 20000
    flush_seconds: 1.0
  db_pool_size: 5
  db_max_overflow: 10
  db_pool_timeout: 30
  db_pool_recycle: 1800

environments:
  dev:
    host: localhost
    port: 5533
    user: daylily
    password: ""
    database: tapdb_dev
    audit_log_euid_prefix: CGX
    support_email: support@example.com
    cognito_user_pool_id: us-east-1_xxxxxxxxx
    cognito_app_client_id: client123
    cognito_app_client_secret: ""
    cognito_client_name: tapdb
    cognito_region: us-east-1
    cognito_domain: tapdb-dev-users.auth.us-east-1.amazoncognito.com
    cognito_callback_url: https://localhost:8911/auth/callback
    cognito_logout_url: https://localhost:8911/login
    aws_profile: lsmc

  test:
    host: localhost
    port: 5534
    user: daylily
    password: ""
    database: tapdb_test
    audit_log_euid_prefix: CGX
    support_email: support@example.com

  prod:
    host: example-prod-host
    port: 5533
    user: tapdb_admin
    password: CHANGEME
    database: tapdb_prod
    audit_log_euid_prefix: CGX
    support_email: support@example.com

  aurora_dev:
    engine_type: aurora
    host: tapdb-dev-cluster.cluster-xxxxxxxxxxxx.us-west-2.rds.amazonaws.com
    port: 5432
    user: tapdb_admin
    password: ""
    database: tapdb_dev
    audit_log_euid_prefix: CGX
    support_email: support@example.com
    region: us-west-2
    cluster_identifier: tapdb-dev-cluster
    iam_auth: true
    ssl: true
