name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.12'

jobs:
  lint:
    name: Code Quality (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check daylily_tapdb/ admin/ tests/

      - name: Run ruff format check
        run: ruff format --check daylily_tapdb/ admin/ tests/

  security:
    name: Security Scanning (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install "bandit[toml]"

      - name: Run bandit security scan
        run: bandit -c pyproject.toml -r daylily_tapdb/ admin/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: tapdb
          POSTGRES_PASSWORD: tapdb
          POSTGRES_DB: tapdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tapdb -d tapdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TAPDB_TEST_DSN: postgresql://tapdb:tapdb@localhost:5432/tapdb

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install -e ".[dev,cli,aurora,admin]"

      - name: Show SCM version context
        run: |
          git describe --tags --dirty --always
          python -m setuptools_scm

      - name: Build wheel artifact
        run: python -m build --wheel

      - name: Verify wheel includes schema assets
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          wheels = sorted(Path("dist").glob("*.whl"))
          if not wheels:
              raise SystemExit("No wheel artifact was produced in dist/")

          wheel_path = wheels[-1]
          with zipfile.ZipFile(wheel_path) as wheel:
              names = set(wheel.namelist())

          def has_suffix(suffix: str) -> bool:
              return any(name.endswith(suffix) for name in names)

          missing = []
          for required in ("schema/tapdb_schema.sql", "schema/rls.sql"):
              if not has_suffix(required):
                  missing.append(required)

          migration_files = [
              name
              for name in names
              if "schema/migrations/" in name and name.endswith(".sql")
          ]
          legacy_migration_files = [
              name
              for name in names
              if "schema/migrations_legacy/" in name and name.endswith(".sql")
          ]

          if not migration_files:
              missing.append("schema/migrations/*.sql")
          if not legacy_migration_files:
              missing.append("schema/migrations_legacy/*.sql")

          if missing:
              joined = ", ".join(missing)
              raise SystemExit(f"Wheel missing required schema assets: {joined}")

          print(f"Validated schema assets in {wheel_path.name}")
          PY

      - name: Run tests
        run: python -m pytest tests/ -q --deselect tests/test_admin_routes_smoke.py
