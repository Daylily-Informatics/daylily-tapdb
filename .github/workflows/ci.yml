name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'feat/*'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  security:
    runs-on: ubuntu-latest
    # Informational — pre-existing findings exist; does not block merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install bandit detect-secrets
      - name: Bandit security scan
        run: bandit -r daylily_tapdb/ admin/ -x tests/ --skip B101 -ll -ii || true
      - name: Detect secrets
        run: detect-secrets scan --list-all-plugins 2>/dev/null; detect-secrets scan

  test:
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: tapdb
          POSTGRES_PASSWORD: tapdb
          POSTGRES_DB: tapdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tapdb -d tapdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TAPDB_TEST_DSN: postgresql://tapdb:tapdb@localhost:5432/tapdb

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install build
          pip install -e ".[dev,cli,aurora,admin]"
      - name: Build wheel artifact
        run: python -m build --wheel
      - name: Verify wheel includes schema assets
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          wheels = sorted(Path("dist").glob("*.whl"))
          if not wheels:
              raise SystemExit("No wheel artifact was produced in dist/")

          wheel_path = wheels[-1]
          with zipfile.ZipFile(wheel_path) as wheel:
              names = set(wheel.namelist())

          def has_suffix(suffix: str) -> bool:
              return any(name.endswith(suffix) for name in names)

          missing = []
          for required in ("schema/tapdb_schema.sql", "schema/rls.sql"):
              if not has_suffix(required):
                  missing.append(required)

          migration_files = [
              name
              for name in names
              if "schema/migrations/" in name and name.endswith(".sql")
          ]
          legacy_migration_files = [
              name
              for name in names
              if "schema/migrations_legacy/" in name and name.endswith(".sql")
          ]

          if not migration_files:
              missing.append("schema/migrations/*.sql")
          if not legacy_migration_files:
              missing.append("schema/migrations_legacy/*.sql")

          if missing:
              joined = ", ".join(missing)
              raise SystemExit(f"Wheel missing required schema assets: {joined}")

          print(f"Validated schema assets in {wheel_path.name}")
          PY
      - name: Run tests
        run: python -m pytest tests/ -q --deselect tests/test_admin_routes_smoke.py
