name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'feat/*'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  security:
    runs-on: ubuntu-latest
    # Informational — pre-existing findings exist; does not block merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install bandit detect-secrets
      - name: Bandit security scan
        run: bandit -r daylily_tapdb/ admin/ -x tests/ --skip B101 -ll -ii || true
      - name: Detect secrets
        run: detect-secrets scan --list-all-plugins 2>/dev/null; detect-secrets scan

  test:
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: tapdb
          POSTGRES_PASSWORD: tapdb
          POSTGRES_DB: tapdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tapdb -d tapdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TAPDB_TEST_DSN: postgresql://tapdb:tapdb@localhost:5432/tapdb

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,cli,aurora,admin]"
      - name: Run tests
        run: python -m pytest tests/ -q --deselect tests/test_admin_routes_smoke.py
