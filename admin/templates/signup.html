<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - TAPDB Admin</title>
    <link rel="stylesheet" type="text/css" href="{{ style.skin_css }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h1>🗄️ TAPDB Account</h1>
            <p>Create Cognito-backed account</p>
        </div>

        {% if error %}
        <div class="status status--error" role="alert" aria-live="polite">
            <span class="status-icon" aria-hidden="true">⨯</span>
            <span><strong>Error:</strong> {{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="/signup">
            <div class="auth-form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autofocus>
            </div>
            <div class="auth-form-group">
                <label for="display_name">Display Name (optional)</label>
                <input type="text" id="display_name" name="display_name">
            </div>
            <div class="auth-form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="8">
            </div>
            <div class="auth-form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="8">
            </div>
            <button type="submit" class="btn btn--primary" style="width:100%;">Create Account</button>
        </form>
        <a href="/auth/login" class="btn-google">Continue with Google</a>

        <a href="/login" class="auth-link">Already have an account? Sign in</a>
    </div>
</body>
</html>
