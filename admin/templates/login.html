<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TAPDB Admin</title>
    <link rel="stylesheet" type="text/css" href="{{ style.skin_css }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h1>🗄️ TAPDB Admin</h1>
            <p>Templated Abstract Polymorphic Database</p>
        </div>

        {% if error %}
        <div class="status status--error" role="alert" aria-live="polite">
            <span class="status-icon" aria-hidden="true">⨯</span>
            <span><strong>Error:</strong> {{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="auth-form-group">
                <label for="username">Email or Username</label>
                <input type="text" id="username" name="username" required autofocus placeholder="email or username">
            </div>
            <div class="auth-form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn--primary" style="width:100%;">Sign In</button>
            <a href="/auth/login" class="btn-google">Continue with Google</a>
        </form>
        <a href="/signup" class="auth-link">Create account</a>
    </div>
</body>
</html>
